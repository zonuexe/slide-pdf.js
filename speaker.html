<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <base href="./">
  <title>Speaker View</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0f0f0f;
      color: #f5f5f5;
    }
    body {
      display: flex;
    }
    .speaker-layout {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 1.5rem;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
    }
    .preview-row {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      min-height: 0;
    }
    .preview-tile {
      background: #161616;
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 0;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }
    .preview-title {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: #b5b5b5;
    }
    .preview-frame {
      flex: 1;
      background: #050505;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }
    .preview-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      background: #000;
    }
    .speaker-clock {
      font-size: 3rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      margin-top: auto;
    }
    .speaker-rabbit-panel {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
    }
    .speaker-rabbit-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .speaker-rabbit-panel label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #c0c0c0;
    }
    .speaker-rabbit-input {
      width: 5rem;
      padding: 0.4rem 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.3);
      color: inherit;
      font-size: 1rem;
    }
    .speaker-rabbit-input:focus-visible {
      outline: 2px solid #7dd3fc;
      outline-offset: 2px;
    }
    .speaker-rabbit-button {
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: #7dd3fc;
      color: #05121a;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .speaker-rabbit-button:hover,
    .speaker-rabbit-button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(125, 211, 252, 0.5);
      outline: none;
    }
    .speaker-rabbit-status {
      font-size: 0.85rem;
      color: #d1d5db;
      min-height: 1.2rem;
    }
    .speaker-tools {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
    }
    .speaker-tools-row {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .speaker-tools-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #c0c0c0;
      margin-inline-end: 0.25rem;
    }
    .tool-btn {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      cursor: pointer;
      background: rgba(0, 0, 0, 0.3);
      color: #f5f5f5;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .tool-btn:hover,
    .tool-btn:focus-visible {
      border-color: #7dd3fc;
      outline: none;
    }
    .tool-btn.is-active {
      background: #7dd3fc;
      color: #05121a;
      border-color: #7dd3fc;
    }
    .tool-btn.is-blank {
      background: #f5f5f5;
      color: #111;
      border-color: #f5f5f5;
    }
    .tool-color {
      width: 2.2rem;
      height: 2.2rem;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 0.4rem;
      background: transparent;
      cursor: pointer;
    }
    .tool-width-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: #c0c0c0;
    }
    .speaker-tools-hint {
      font-size: 0.78rem;
      color: #9aa0a6;
    }
    .speaker-current-overlay {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none;
    }
    .preview-tile.is-tool-active .preview-canvas {
      cursor: crosshair;
    }
    .speaker-channel-indicator {
      font-size: 0.8rem;
      text-align: center;
      color: #7dd3fc;
      opacity: 0.85;
      transition: opacity 0.2s ease-in-out;
    }
    .speaker-channel-indicator.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body class="speaker-view">
  <div class="speaker-layout" id="js-speaker-root">
    <div class="preview-row">
      <div class="preview-tile" id="js-speaker-current-tile">
        <div class="preview-title" id="js-speaker-current-label">現在: -</div>
        <div class="preview-frame" id="js-speaker-current-frame">
          <canvas class="preview-canvas" id="js-speaker-current-canvas"></canvas>
        </div>
      </div>
      <div class="preview-tile">
        <div class="preview-title" id="js-speaker-next-label">次: -</div>
        <div class="preview-frame">
          <canvas class="preview-canvas" id="js-speaker-next-canvas"></canvas>
        </div>
      </div>
    </div>
    <div class="speaker-clock" id="js-speaker-clock">--:--:--</div>
    <div class="speaker-rabbit-panel">
      <div class="speaker-rabbit-row">
        <label for="js-speaker-rabbit-duration">Rabbit timer (minutes)</label>
        <input
          id="js-speaker-rabbit-duration"
          class="speaker-rabbit-input"
          type="number"
          inputmode="decimal"
          min="0.1"
          step="0.1"
          placeholder="5"
          value="5"
        />
        <label for="js-speaker-rabbit-interval">Turtle step (sec)</label>
        <input
          id="js-speaker-rabbit-interval"
          class="speaker-rabbit-input"
          type="number"
          inputmode="decimal"
          min="1"
          step="1"
          placeholder="5"
          value="5"
        />
        <label for="js-speaker-rabbit-sprite">Character</label>
        <select id="js-speaker-rabbit-sprite" class="speaker-rabbit-input speaker-rabbit-select">
          <option value="elephpant" selected>Elephpant</option>
          <option value="turtle">Rabbit turtle</option>
        </select>
        <button id="js-speaker-rabbit-start" class="speaker-rabbit-button" type="button">Start Rabbit</button>
      </div>
      <div id="js-speaker-rabbit-status" class="speaker-rabbit-status" aria-live="polite">Timer idle.</div>
    </div>
    <div class="speaker-tools" id="js-speaker-tools">
      <div class="speaker-tools-row">
        <span class="speaker-tools-label">注目ツール</span>
        <button type="button" class="tool-btn is-active" data-tool="off">Off (O)</button>
        <button type="button" class="tool-btn" data-tool="laser">Laser (L)</button>
        <button type="button" class="tool-btn" data-tool="pen">Pen (P)</button>
        <button type="button" class="tool-btn" data-tool="highlighter">Marker (H)</button>
        <button type="button" class="tool-btn" data-tool="spotlight">Spotlight (T)</button>
        <input type="color" id="js-tool-color" class="tool-color" value="#ff2d55" title="ペン/マーカーの色" />
        <label class="tool-width-label">太さ
          <input type="range" id="js-tool-width" min="1" max="20" step="1" value="4" />
        </label>
        <button type="button" class="tool-btn" id="js-tool-clear">消去 (C)</button>
        <button type="button" class="tool-btn" id="js-tool-blank">Blank (B)</button>
      </div>
      <div class="speaker-tools-hint">「現在」プレビュー上でドラッグして描画／レーザー・スポットライトはポインタ移動で追従。</div>
    </div>
    <div class="speaker-channel-indicator" id="js-speaker-channel">channel: connecting…</div>
  </div>
  <noscript>Enable JavaScript to use the speaker view.</noscript>
  <script type="module">
    import * as pdfjsLib from './node_modules/pdfjs-dist/build/pdf.mjs';

    const params = new URLSearchParams(window.location.search);
    const handshake = params.get('handshake') || undefined;
    const pdfUrl = params.get('slide');
    const channelIndicator = document.getElementById('js-speaker-channel');
    const currentLabel = document.getElementById('js-speaker-current-label');
    const nextLabel = document.getElementById('js-speaker-next-label');
    const currentCanvas = document.getElementById('js-speaker-current-canvas');
    const nextCanvas = document.getElementById('js-speaker-next-canvas');
    const clockElement = document.getElementById('js-speaker-clock');
    const rabbitDurationInput = document.getElementById('js-speaker-rabbit-duration');
    const rabbitIntervalInput = document.getElementById('js-speaker-rabbit-interval');
    const rabbitStartButton = document.getElementById('js-speaker-rabbit-start');
    const rabbitSpriteSelect = document.getElementById('js-speaker-rabbit-sprite');
    const rabbitStatus = document.getElementById('js-speaker-rabbit-status');

    let pdfDoc = null;
    let currentPage = 1;
    let nextPage = null;
    let totalPages = 0;
    let renderTasks = { current: null, next: null };

    pdfjsLib.GlobalWorkerOptions.workerSrc = new URL('./pdf.worker.mjs', import.meta.url).toString();

    const defaultChannelText = 'channel: connecting…';
    const updateChannel = (
      text,
      { highlight = false, pulse = false, hideAfter = false, force = false } = {}
    ) => {
      if (!channelIndicator) {
        return;
      }
      const shouldHide = !force && (!text || text === 'channel: synced');
      if (shouldHide) {
        channelIndicator.textContent = '';
        channelIndicator.classList.add('hidden');
        channelIndicator.classList.remove('pulse', 'green', 'amber', 'red');
        return;
      }
      channelIndicator.classList.remove('hidden');
      channelIndicator.textContent = text;
      channelIndicator.classList.toggle('pulse', Boolean(pulse));
      if (highlight) {
        channelIndicator.classList.add('green');
        channelIndicator.classList.remove('amber', 'red');
      } else {
        channelIndicator.classList.remove('green');
      }
      if (hideAfter) {
        setTimeout(() => {
          if (channelIndicator.textContent === text) {
            channelIndicator.textContent = '';
            channelIndicator.classList.add('hidden');
          }
        }, 800);
      }
    };
    updateChannel(defaultChannelText, { force: true });

    // 時計の更新
    const formatter = new Intl.DateTimeFormat(undefined, {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
    const updateClock = () => {
      if (clockElement) {
        clockElement.textContent = formatter.format(new Date());
      }
    };
    updateClock();
    setInterval(updateClock, 1000);

    const formatRabbitDuration = (ms) => {
      if (!Number.isFinite(ms) || ms < 0) {
        return '--:--';
      }
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    };

    const updateRabbitPanelStatus = (text, state = 'idle', extras = {}) => {
      if (!rabbitStatus) return;
      let nextText = text;
      if ((!nextText || !nextText.trim()) && state === 'running') {
        if (typeof extras.elapsedMs === 'number' && typeof extras.durationMs === 'number') {
          nextText = `Timer: ${formatRabbitDuration(extras.elapsedMs)} / ${formatRabbitDuration(extras.durationMs)}`;
        } else {
          nextText = 'Timer running…';
        }
      }
      if ((!nextText || !nextText.trim()) && state === 'completed') {
        nextText = 'Timer completed.';
      }
      rabbitStatus.textContent = nextText;
      rabbitStatus.dataset.state = state;
    };

    const requestRabbitTimerStart = () => {
      if (!(rabbitDurationInput instanceof HTMLInputElement)) {
        updateRabbitPanelStatus('Rabbit timer unavailable.', 'error');
        return;
      }

      const minutesValue = Number.isNaN(rabbitDurationInput.valueAsNumber)
        ? Number.parseFloat(rabbitDurationInput.value)
        : rabbitDurationInput.valueAsNumber;

      let intervalSeconds = Number.isNaN(rabbitIntervalInput?.valueAsNumber ?? Number.NaN)
        ? Number.parseFloat(rabbitIntervalInput?.value ?? '')
        : rabbitIntervalInput?.valueAsNumber;

      if (!Number.isFinite(intervalSeconds) || intervalSeconds <= 0) {
        intervalSeconds = 5;
      }

      if (!Number.isFinite(minutesValue) || minutesValue <= 0) {
        updateRabbitPanelStatus('Enter a positive number of minutes.', 'error');
        rabbitDurationInput.focus();
        rabbitDurationInput.select();
        return;
      }

      if (!window.opener || window.opener.closed) {
        updateRabbitPanelStatus('Host window unavailable.', 'error');
        return;
      }

      try {
        const spriteValue =
          rabbitSpriteSelect instanceof HTMLSelectElement ? rabbitSpriteSelect.value : 'elephpant';
        window.opener.postMessage(
          {
            type: 'speaker-rabbit-start',
            handshake,
            minutes: minutesValue,
            intervalSeconds,
            sprite: spriteValue
          },
          window.location.origin
        );
        updateRabbitPanelStatus(`Requested Rabbit timer: ${minutesValue} min`, 'running', {
          elapsedMs: 0,
          durationMs: minutesValue * 60 * 1000
        });
      } catch (error) {
        console.error('Failed to request Rabbit timer', error);
        updateRabbitPanelStatus('Could not send Rabbit timer request.', 'error');
      }
    };

    if (rabbitStartButton instanceof HTMLButtonElement) {
      rabbitStartButton.addEventListener('click', requestRabbitTimerStart);
    }
    const rabbitInputs = [rabbitDurationInput, rabbitIntervalInput, rabbitSpriteSelect];
    rabbitInputs.forEach((input) => {
      if (input instanceof HTMLInputElement) {
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            requestRabbitTimerStart();
          }
        });
      }
    });

    // キーボードイベントをホストに転送
    const handleKeydown = (event) => {
      if (event.shiftKey || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }
      const navKeys = ['ArrowLeft', 'ArrowDown', 'k', 'a', 'K', 'A', 'PageUp',
                      'ArrowRight', 'ArrowUp', 'j', 's', 'J', 'S', 'PageDown'];
      if (navKeys.includes(event.key) && window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage({
            type: 'speaker-keydown',
            handshake,
            key: event.key
          }, window.location.origin);
        } catch (error) {
          console.error('Failed to send keydown event', error);
        }
      }
    };
    // Listen once at the window level so navigation is forwarded a single time.
    window.addEventListener('keydown', handleKeydown);

    // ===== Attention tools (laser / pen / highlighter / spotlight / blank) =====
    const toolButtons = Array.from(document.querySelectorAll('.tool-btn[data-tool]'));
    const toolColor = document.getElementById('js-tool-color');
    const toolWidth = document.getElementById('js-tool-width');
    const toolClearBtn = document.getElementById('js-tool-clear');
    const toolBlankBtn = document.getElementById('js-tool-blank');
    const currentTile = document.getElementById('js-speaker-current-tile');
    const currentFrame = document.getElementById('js-speaker-current-frame');

    const TOOL_LASER_TRAIL_MS = 650;
    const TOOL_LASER_CORE_RATIO = 0.005;
    const TOOL_SPOTLIGHT_RADIUS_RATIO = 0.18;
    const TOOL_SPOTLIGHT_DIM = 0.62;

    const toolState = { tool: 'off', blankMode: 'off' };
    const echo = {
      strokesByPage: new Map(),
      activeStroke: null,
      laserTrail: [],
      spotlight: null,
      rafId: null,
      page: 1
    };

    const toolOverlay = document.createElement('canvas');
    toolOverlay.className = 'speaker-current-overlay';
    const toolCtx = toolOverlay.getContext('2d');
    if (currentFrame) {
      currentFrame.appendChild(toolOverlay);
    }

    const clampUnit = (value) => Math.min(1, Math.max(0, value));
    const penWidthFraction = () => (Number(toolWidth?.value) || 4) / 1000;
    const strokeSizeFor = (tool) => (tool === 'highlighter' ? penWidthFraction() * 5 : penWidthFraction());
    const penColor = () => (toolColor instanceof HTMLInputElement ? toolColor.value : '#ff2d55');

    function syncToolOverlay() {
      if (!currentCanvas || !toolOverlay || !currentFrame) {
        return;
      }
      const cssWidth = currentCanvas.style.width;
      const cssHeight = currentCanvas.style.height;
      if (!cssWidth || !cssHeight) {
        return;
      }
      const frameRect = currentFrame.getBoundingClientRect();
      const canvasRect = currentCanvas.getBoundingClientRect();
      toolOverlay.style.left = `${canvasRect.left - frameRect.left}px`;
      toolOverlay.style.top = `${canvasRect.top - frameRect.top}px`;
      toolOverlay.style.width = cssWidth;
      toolOverlay.style.height = cssHeight;
      toolOverlay.width = currentCanvas.width;
      toolOverlay.height = currentCanvas.height;
      renderEcho();
    }

    function drawEchoInk(stroke, w, h) {
      const pts = stroke.points;
      if (!pts.length) {
        return;
      }
      toolCtx.save();
      toolCtx.lineJoin = 'round';
      toolCtx.lineCap = 'round';
      toolCtx.strokeStyle = stroke.color;
      toolCtx.fillStyle = stroke.color;
      const lineWidth = Math.max(stroke.size * w, 1);
      toolCtx.lineWidth = lineWidth;
      if (stroke.tool === 'highlighter') {
        toolCtx.globalAlpha = 0.38;
        toolCtx.globalCompositeOperation = 'multiply';
      }
      if (pts.length === 1) {
        toolCtx.beginPath();
        toolCtx.arc(pts[0].x * w, pts[0].y * h, lineWidth / 2, 0, Math.PI * 2);
        toolCtx.fill();
      } else {
        toolCtx.beginPath();
        pts.forEach((p, index) => {
          const x = p.x * w;
          const y = p.y * h;
          if (index === 0) {
            toolCtx.moveTo(x, y);
          } else {
            toolCtx.lineTo(x, y);
          }
        });
        toolCtx.stroke();
      }
      toolCtx.restore();
    }

    function drawEchoSpotlight(point, w, h) {
      const radius = TOOL_SPOTLIGHT_RADIUS_RATIO * Math.hypot(w, h);
      const cx = point.x * w;
      const cy = point.y * h;
      toolCtx.save();
      toolCtx.fillStyle = `rgba(0,0,0,${TOOL_SPOTLIGHT_DIM})`;
      toolCtx.fillRect(0, 0, w, h);
      toolCtx.globalCompositeOperation = 'destination-out';
      const gradient = toolCtx.createRadialGradient(cx, cy, radius * 0.55, cx, cy, radius);
      gradient.addColorStop(0, 'rgba(0,0,0,1)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      toolCtx.fillStyle = gradient;
      toolCtx.beginPath();
      toolCtx.arc(cx, cy, radius, 0, Math.PI * 2);
      toolCtx.fill();
      toolCtx.restore();
    }

    function drawEchoLaser(w, h) {
      const now = Date.now();
      echo.laserTrail = echo.laserTrail.filter((p) => now - p.t < TOOL_LASER_TRAIL_MS);
      const trail = echo.laserTrail;
      if (!trail.length) {
        return;
      }
      const core = Math.max(TOOL_LASER_CORE_RATIO * w, 2);
      toolCtx.save();
      // sharp, saturated fading dots for the trail
      for (const p of trail) {
        const age = (now - p.t) / TOOL_LASER_TRAIL_MS;
        const alpha = Math.max(0, 1 - age);
        const radius = core * (0.4 + 0.5 * (1 - age));
        toolCtx.fillStyle = `rgba(210,10,10,${0.9 * alpha})`;
        toolCtx.beginPath();
        toolCtx.arc(p.x * w, p.y * h, radius, 0, Math.PI * 2);
        toolCtx.fill();
      }
      // head: tight glow + solid saturated core + hot center
      const last = trail[trail.length - 1];
      const lx = last.x * w;
      const ly = last.y * h;
      const glow = toolCtx.createRadialGradient(lx, ly, core * 0.7, lx, ly, core * 1.7);
      glow.addColorStop(0, 'rgba(255,0,0,0.45)');
      glow.addColorStop(1, 'rgba(255,0,0,0)');
      toolCtx.fillStyle = glow;
      toolCtx.beginPath();
      toolCtx.arc(lx, ly, core * 1.7, 0, Math.PI * 2);
      toolCtx.fill();
      toolCtx.fillStyle = 'rgba(205,0,0,1)';
      toolCtx.beginPath();
      toolCtx.arc(lx, ly, core, 0, Math.PI * 2);
      toolCtx.fill();
      toolCtx.fillStyle = 'rgba(255,170,170,0.95)';
      toolCtx.beginPath();
      toolCtx.arc(lx, ly, core * 0.4, 0, Math.PI * 2);
      toolCtx.fill();
      toolCtx.restore();
    }

    function renderEcho() {
      if (!toolCtx || !toolOverlay) {
        return;
      }
      const w = toolOverlay.width;
      const h = toolOverlay.height;
      toolCtx.clearRect(0, 0, w, h);
      const strokes = echo.strokesByPage.get(echo.page);
      if (strokes) {
        strokes.forEach((stroke) => drawEchoInk(stroke, w, h));
      }
      if (echo.activeStroke) {
        drawEchoInk(echo.activeStroke, w, h);
      }
      if (echo.spotlight) {
        drawEchoSpotlight(echo.spotlight, w, h);
      }
      drawEchoLaser(w, h);
    }

    function ensureEchoRaf() {
      if (echo.rafId !== null) {
        return;
      }
      echo.rafId = requestAnimationFrame(() => {
        echo.rafId = null;
        renderEcho();
        if (echo.laserTrail.length > 0) {
          ensureEchoRaf();
        }
      });
    }

    function sendAnnotation(tool, phase, point) {
      if (!window.opener || window.opener.closed) {
        return;
      }
      const size = tool === 'pen' || tool === 'highlighter' ? strokeSizeFor(tool) : undefined;
      try {
        window.opener.postMessage(
          {
            type: 'annotation-draw',
            handshake,
            tool,
            phase,
            x: point.x,
            y: point.y,
            color: penColor(),
            size
          },
          window.location.origin
        );
      } catch (error) {
        console.error('Failed to send annotation', error);
      }
    }

    function toNorm(event) {
      const rect = currentCanvas.getBoundingClientRect();
      return {
        x: clampUnit((event.clientX - rect.left) / (rect.width || 1)),
        y: clampUnit((event.clientY - rect.top) / (rect.height || 1))
      };
    }

    let drawing = false;

    function endStroke(point) {
      if ((toolState.tool === 'pen' || toolState.tool === 'highlighter') && drawing) {
        drawing = false;
        if (echo.activeStroke) {
          const list = echo.strokesByPage.get(echo.page) || [];
          list.push(echo.activeStroke);
          echo.strokesByPage.set(echo.page, list);
          echo.activeStroke = null;
        }
        renderEcho();
        sendAnnotation(toolState.tool, 'end', point || { x: 0, y: 0 });
      }
    }

    if (currentCanvas) {
      currentCanvas.addEventListener('pointerdown', (event) => {
        if (toolState.tool === 'off') {
          return;
        }
        event.preventDefault();
        try {
          currentCanvas.setPointerCapture(event.pointerId);
        } catch {
          /* ignore */
        }
        const p = toNorm(event);
        if (toolState.tool === 'laser') {
          echo.laserTrail.push({ x: p.x, y: p.y, t: Date.now() });
          renderEcho();
          ensureEchoRaf();
          sendAnnotation('laser', 'move', p);
        } else if (toolState.tool === 'spotlight') {
          echo.spotlight = p;
          renderEcho();
          sendAnnotation('spotlight', 'move', p);
        } else {
          drawing = true;
          echo.activeStroke = {
            tool: toolState.tool,
            color: penColor(),
            size: strokeSizeFor(toolState.tool),
            points: [p]
          };
          renderEcho();
          sendAnnotation(toolState.tool, 'start', p);
        }
      });

      currentCanvas.addEventListener('pointermove', (event) => {
        if (toolState.tool === 'off') {
          return;
        }
        const p = toNorm(event);
        if (toolState.tool === 'laser') {
          echo.laserTrail.push({ x: p.x, y: p.y, t: Date.now() });
          renderEcho();
          ensureEchoRaf();
          sendAnnotation('laser', 'move', p);
        } else if (toolState.tool === 'spotlight') {
          echo.spotlight = p;
          renderEcho();
          sendAnnotation('spotlight', 'move', p);
        } else if (drawing && echo.activeStroke) {
          echo.activeStroke.points.push(p);
          renderEcho();
          sendAnnotation(toolState.tool, 'move', p);
        }
      });

      currentCanvas.addEventListener('pointerup', (event) => endStroke(toNorm(event)));
      currentCanvas.addEventListener('pointercancel', () => endStroke());
      currentCanvas.addEventListener('pointerleave', () => {
        if (toolState.tool === 'spotlight') {
          echo.spotlight = null;
          renderEcho();
          sendAnnotation('spotlight', 'end', { x: 0, y: 0 });
        }
        endStroke();
      });
    }

    function setTool(tool) {
      toolState.tool = tool;
      toolButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.tool === tool);
      });
      if (currentTile) {
        currentTile.classList.toggle('is-tool-active', tool !== 'off');
      }
      if (tool !== 'spotlight' && echo.spotlight) {
        echo.spotlight = null;
        renderEcho();
        sendAnnotation('spotlight', 'end', { x: 0, y: 0 });
      }
    }

    toolButtons.forEach((button) => {
      button.addEventListener('click', () => setTool(button.dataset.tool));
    });

    function clearAnnotations() {
      echo.strokesByPage.delete(echo.page);
      echo.activeStroke = null;
      echo.laserTrail = [];
      echo.spotlight = null;
      renderEcho();
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage({ type: 'annotation-clear', handshake }, window.location.origin);
        } catch (error) {
          console.error('Failed to send annotation clear', error);
        }
      }
    }

    if (toolClearBtn) {
      toolClearBtn.addEventListener('click', clearAnnotations);
    }

    function setBlank(mode) {
      toolState.blankMode = mode;
      if (toolBlankBtn) {
        toolBlankBtn.classList.toggle('is-active', mode === 'black');
        toolBlankBtn.classList.toggle('is-blank', mode === 'white');
        toolBlankBtn.textContent =
          mode === 'off' ? 'Blank (B)' : mode === 'black' ? 'Blank: 黒 (B)' : 'Blank: 白 (B)';
      }
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage({ type: 'annotation-blank', handshake, blankMode: mode }, window.location.origin);
        } catch (error) {
          console.error('Failed to send blank state', error);
        }
      }
    }

    function cycleBlank() {
      const order = { off: 'black', black: 'white', white: 'off' };
      setBlank(order[toolState.blankMode] || 'black');
    }

    if (toolBlankBtn) {
      toolBlankBtn.addEventListener('click', cycleBlank);
    }

    window.addEventListener('keydown', (event) => {
      const target = event.target;
      if (target && (target.tagName === 'INPUT' || target.tagName === 'SELECT' || target.tagName === 'TEXTAREA')) {
        return;
      }
      if (event.metaKey || event.ctrlKey || event.altKey) {
        return;
      }
      const key = event.key.toLowerCase();
      const toolKeys = { o: 'off', l: 'laser', p: 'pen', h: 'highlighter', t: 'spotlight' };
      if (toolKeys[key]) {
        setTool(toolKeys[key]);
      } else if (key === 'c') {
        clearAnnotations();
      } else if (key === 'b') {
        cycleBlank();
      } else {
        return;
      }
      event.preventDefault();
    });

    // Re-sync overlay whenever the preview canvas changes size (render / resize).
    if ('ResizeObserver' in window && currentCanvas) {
      const overlayResizeObserver = new ResizeObserver(() => syncToolOverlay());
      overlayResizeObserver.observe(currentCanvas);
    }

    // Track page changes for the local echo layer.
    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) {
        return;
      }
      const data = event.data;
      if (!data || typeof data !== 'object') {
        return;
      }
      if (data.type === 'speaker-navigation-update' && data.handshake === handshake) {
        const newPage = data.currentPage ?? 1;
        if (newPage !== echo.page) {
          echo.page = newPage;
          echo.activeStroke = null;
          echo.laserTrail = [];
          echo.spotlight = null;
        }
        syncToolOverlay();
        renderEcho();
      }
    });

    // PDF読み込み
    async function loadPDF(url) {
      try {
        updateChannel('channel: loading PDF…', { force: true });
        const loadingTask = pdfjsLib.getDocument({
          url: url,
          cMapUrl: new URL('./cmaps/', import.meta.url).toString(),
          cMapPacked: true
        });
        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        updateChannel('channel: PDF loaded', { highlight: true, pulse: true, hideAfter: true, force: true });
        return true;
      } catch (error) {
        console.error('Failed to load PDF', error);
        updateChannel('channel: error - PDF load failed', { force: true });
        return false;
      }
    }

    // ページのレンダリング
    async function renderPreview(role, pageNumber, canvas, label) {
      if (!canvas || !label) return;

      const cancelTask = (task) => {
        if (task) {
          try {
            task.cancel();
          } catch {
            /* no-op */
          }
        }
      };

      cancelTask(renderTasks[role]);
      renderTasks[role] = null;

      if (!pdfDoc || !pageNumber) {
        label.textContent = role === 'current' ? '現在: -' : '次: (終端)';
        const ctx = canvas.getContext('2d');
        if (ctx) {
          drawFallback(role, ctx, canvas);
        }
        return;
      }

      try {
        const page = await pdfDoc.getPage(pageNumber);
        const bounds = canvas.parentElement;
        const maxWidth = bounds?.clientWidth ?? Math.max(window.innerWidth / 2, 200);
        const maxHeight = bounds?.clientHeight ?? Math.max(window.innerHeight * 0.6, 200);
        const baseViewport = page.getViewport({ scale: 1 });
        const widthScale = maxWidth / baseViewport.width;
        const heightScale = maxHeight / baseViewport.height;
        const scale = Math.max(Math.min(widthScale, heightScale), 0.1);
        const viewport = page.getViewport({ scale });
        const outputScale = window.devicePixelRatio ?? 1;

        canvas.width = Math.max(Math.floor(viewport.width * outputScale), 1);
        canvas.height = Math.max(Math.floor(viewport.height * outputScale), 1);
        canvas.style.width = `${viewport.width}px`;
        canvas.style.height = `${viewport.height}px`;

        const context = canvas.getContext('2d');
        if (!context) return;

        context.setTransform(1, 0, 0, 1, 0, 0);
        context.fillStyle = '#fff';
        context.fillRect(0, 0, canvas.width, canvas.height);

        const renderContext = {
          canvasContext: context,
          viewport
        };
        if (outputScale !== 1) {
          renderContext.transform = [outputScale, 0, 0, outputScale, 0, 0];
        }

        label.textContent = role === 'current'
          ? `現在: ${pageNumber}/${totalPages}`
          : `次: ${pageNumber}/${totalPages}`;

        const renderTask = page.render(renderContext);
        renderTasks[role] = renderTask;
        try {
          await renderTask.promise;
        } catch (error) {
          if (error?.name !== 'RenderingCancelledException') {
            throw error;
          }
        } finally {
          if (renderTasks[role] === renderTask) {
            renderTasks[role] = null;
          }
        }
      } catch (error) {
        console.error(`Failed to render ${role} preview`, error);
        label.textContent = role === 'current' ? '現在: エラー' : '次: エラー';
      }
    }

    function drawFallback(role, context, canvas) {
      const width = canvas.parentElement?.clientWidth ?? Math.max(window.innerWidth / 2, 200);
      const height = canvas.parentElement?.clientHeight ?? Math.max(window.innerHeight * 0.6, 200);
      const ratio = window.devicePixelRatio ?? 1;
      canvas.width = Math.max(Math.floor(width * ratio), 1);
      canvas.height = Math.max(Math.floor(height * ratio), 1);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;

      context.fillStyle = '#3a3a3a';
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.fillStyle = '#8a8a8a';
      context.font = `${Math.round(canvas.height / 8)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
      context.textAlign = 'center';
      context.textBaseline = 'middle';
      const message = role === 'current' ? 'ページ情報なし' : '次のページなし';
      context.fillText(message, canvas.width / 2, canvas.height / 2);
    }

    // リサイズ時の更新
    let resizeTimeout = null;
    window.addEventListener('resize', () => {
      if (resizeTimeout) {
        clearTimeout(resizeTimeout);
      }
      resizeTimeout = setTimeout(() => {
        if (pdfDoc) {
          renderPreview('current', currentPage, currentCanvas, currentLabel);
          renderPreview('next', nextPage, nextCanvas, nextLabel);
        }
      }, 100);
    });

    // メッセージハンドリング
    window.addEventListener('message', async (event) => {
      if (event.origin !== window.location.origin) {
        return;
      }
      const data = event.data;
      if (!data || typeof data !== 'object') {
        return;
      }

      if (data.type === 'speaker-navigation-update' && data.handshake === handshake) {
        currentPage = data.currentPage ?? 1;
        nextPage = data.nextPage ?? null;
        totalPages = data.totalPages ?? 0;

        if (data.pdfUrl && (!pdfDoc || data.pdfUrl !== pdfUrl)) {
          await loadPDF(data.pdfUrl);
        }

        await Promise.all([
          renderPreview('current', currentPage, currentCanvas, currentLabel),
          renderPreview('next', nextPage, nextCanvas, nextLabel)
        ]);
        updateChannel('', { force: false });
        return;
      }

      if (data.type === 'speaker-ack' && data.handshake === handshake) {
        updateChannel('channel: acknowledged', { pulse: true, hideAfter: true, force: true });
        try {
          event.source?.postMessage({
            type: 'speaker-log',
            handshake,
            message: 'Speaker view received ack'
          }, event.origin);
        } catch (error) {
          console.error('Failed to confirm speaker ack', error);
        }
        return;
      }

      if (data.type === 'rabbit-timer-status' && data.handshake === handshake) {
        updateRabbitPanelStatus(data.message ?? '', data.state ?? 'idle', data);
        if (typeof data.intervalSeconds === 'number' && rabbitIntervalInput instanceof HTMLInputElement) {
          rabbitIntervalInput.value = String(data.intervalSeconds);
        }
        if (typeof data.minutes === 'number' && rabbitDurationInput instanceof HTMLInputElement) {
          rabbitDurationInput.value = String(data.minutes);
        }
        if (data.sprite && rabbitSpriteSelect instanceof HTMLSelectElement) {
          rabbitSpriteSelect.value = data.sprite;
        }
        return;
      }

      if (data.type === 'speaker-ping' && data.handshake === handshake) {
        const label = data.label ? ` ${data.label}` : '';
        updateChannel('', { force: false });
        try {
          event.source?.postMessage({
            type: 'speaker-pong',
            handshake,
            label: data.label,
            timestamp: Date.now()
          }, event.origin);
        } catch (error) {
          console.error('Failed to respond to ping', error);
        }
      }
    });

    // ホストに ready を送信
    const notify = (attempt = 0) => {
      try {
        if (!window.opener) {
          if (attempt < 100) {
            window.requestAnimationFrame(() => notify(attempt + 1));
          } else {
            console.error('Speaker view: window.opener is not available.');
            updateChannel('channel: error - no opener', { force: true });
          }
          return;
        }
        if (window.opener.closed) {
          console.warn('Speaker view: parent window is closed.');
          updateChannel('channel: parent closed', { force: true });
          return;
        }
        updateChannel('channel: waiting for host…', { force: true });
        window.opener.postMessage({ type: 'speaker-ready', handshake }, window.location.origin);
      } catch (error) {
        console.error('Speaker view notify error:', error);
        if (attempt < 100 && error.name !== 'SecurityError') {
          window.requestAnimationFrame(() => notify(attempt + 1));
        } else {
          updateChannel('channel: error - ' + error.message, { force: true });
        }
      }
    };

    const scheduleNotify = () => {
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(() => notify(), 0);
      } else {
        window.addEventListener('load', notify, { once: true });
        document.addEventListener('DOMContentLoaded', () => notify(), { once: true });
      }
    };

    scheduleNotify();
  </script>
</body>
</html>
